button{

/* ========================================= */
/* RESPONSIVE SPLASH SCREEN */
/* ========================================= */

#splash-screen{
    position:fixed;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:linear-gradient(to bottom,#0d67c8,#07427c);

    overflow:hidden;

    z-index:999999;

    opacity:1;
    transition:opacity .8s ease;
}

#splash-screen.fade-out{
    opacity:0;
    pointer-events:none;
}

/* ================= GLOW LINES ================= */

.splash-line{

    width:min(1000px,90vw);
    height:2px;

    margin:18px 0;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.95),
        transparent
    );

    animation:lineGlow 2s ease-in-out infinite;
}

@keyframes lineGlow{

    0%,100%{
        opacity:.35;
        transform:scaleX(.9);
    }

    50%{
        opacity:1;
        transform:scaleX(1);
    }
}

/* ================= LOGO ================= */

.apple-logo-text{

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:nowrap;

    color:#fff;

    font-weight:200;

    font-size:clamp(1.8rem,7vw,4rem);

    letter-spacing:clamp(3px,.8vw,10px);

    text-align:center;

    perspective:1000px;

    padding:0 15px;
}

.apple-logo-text span{

    display:inline-block;

    opacity:0;

    transform:rotateY(90deg);

    animation:letterRotate .9s ease forwards;
}

@keyframes letterRotate{

    from{
        opacity:0;
        transform:rotateY(90deg);
    }

    to{
        opacity:1;
        transform:rotateY(0deg);
    }
}

/* ================= TAGLINE ================= */
.splash-tagline{

    margin-top:35px;

    color:#ffffff;

    font-size:14px;

    letter-spacing:3px;

    text-transform:uppercase;

    text-align:center;

    line-height:1.7;

    max-width:90vw;

    padding:0 20px;

    word-break:break-word;

    animation:fadeUp 2s ease;
}

/* ================= DEVELOPER ================= */

.developer-credit{

    margin-top:18px;

    color:#fff;

    font-size:12px;

    letter-spacing:2px;

    text-align:center;

    padding:0 20px;

    animation:fadeUp 2.5s ease;
}

<script>
window.addEventListener("load", function () {

const splash = document.getElementById("splash-screen");
const welcome = document.getElementById("welcomeScreen");
const container = document.querySelector(".container");
const introSound = document.getElementById("introSound");

// Hide calculator initially
container.style.display = "none";

// Play intro sound
introSound.play().catch(() => {});

// Splash Screen
setTimeout(function () {

    splash.classList.add("fade-out");

    setTimeout(function () {

        splash.style.display = "none";

        // Show Welcome Screen
        welcome.classList.add("show");

        setTimeout(function () {

            // Hide Welcome Screen
            welcome.classList.remove("show");

            setTimeout(function () {

                welcome.style.display = "none";

                // Show Calculator
                container.style.display = "block";

            },800);

        },2500);

    },800);

},2500);

});
    
    
    </script>
<div class="container">

<h1 id="title">VADDI Calculator Pro</h1>

<div class="top-bar">

<select id="language" onchange="changeLanguage()">
    <option value="en">English</option>
    <option value="te">తెలుగు</option>
</select>

<button onclick="toggleTheme()" class="calculate-btn" id="themeBtn">
    🌙 Theme
    </button>
</div>

<select id="calcType">
    <option value="si" id="siOption">Simple Interest</option>
    <option value="ci" id="ciOption">Compound Interest</option>
    <option value="emi" id="emiOption">EMI Calculator</option>
</select>



<input
type="text"
id="amount"
placeholder="Principal Amount"
inputmode="numeric"
oninput="this.value=this.value.replace(/[^0-9]/g,''); formatAmount(this);">

<input
type="text"
id="rate"
placeholder="Interest Rate (%)"
inputmode="decimal"
oninput="this.value=this.value.replace(/[^0-9.]/g,'')">

<input
type="text"
id="time"
placeholder="Time (Months)"
inputmode="numeric"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<div class="btn-group">

<button class="calculate-btn" onclick="calculate()" id="calcBtn">
Calculate
</button>

<button class="clear-btn" onclick="clearFields()" id="clearBtn">
    Clear
    </button>
    

</div>

<div class="result" id="result">
Results will appear here...
</div>

<button class="pdf-btn" onclick="downloadPDF()" id="pdfBtn">
    📄 Download PDF Report
    </button>
    
    <div class="footer" id="footerText">
        Developed by shiva velishoju 
        </div>


</div>

<script>

document.getElementById("amount").addEventListener("keypress", function(e){
    if(!/[0-9]/.test(e.key)){
        e.preventDefault();
    }
});

document.getElementById("rate").addEventListener("keypress", function(e){
    if(!/[0-9.]/.test(e.key)){
        e.preventDefault();
    }
});

document.getElementById("time").addEventListener("keypress", function(e){
    if(!/[0-9]/.test(e.key)){
        e.preventDefault();
    }
});

let reportText="";

const translations = {
en:{
title:"VADDI Calculator Pro",
amount:"Principal Amount",
rate:"Interest Rate (%)",
time:"Duration",
calculate:"Calculate",
clear:"Clear",
download:"📄 Download PDF Report",
simpleInterest:"Simple Interest",
compoundInterest:"Compound Interest",
emi:"EMI Calculator",
footer:"VELINO VADDI Calculator Pro",
theme:"🌙 Theme",
light:"☀️ Light Mode",
waiting:"Results will appear here..."
},

te:{
title:"వెలినో వడ్డీ కాలిక్యులేటర్ ప్రో",
amount:"మొత్తం",
rate:"వడ్డీ రేటు (%)",
time:"కాలం",
calculate:"లెక్కించు",
clear:"తొలగించు",
download:"📄 PDF నివేదిక డౌన్‌లోడ్",
simpleInterest:"సాధారణ వడ్డీ",
compoundInterest:"చక్రవడ్డీ",
emi:"ఈఎంఐ కాలిక్యులేటర్",
footer:"Developed by shiva velishoju",
theme:"🌙 థీమ్",
light:"☀️ లైట్ మోడ్",
waiting:"ఫలితాలు ఇక్కడ కనిపిస్తాయి..."
}
};

function formatAmount(input) {

let value = input.value.replace(/[^\d]/g, '');

if (value === '') {
    input.value = '';
    return;
}

let formatted = new Intl.NumberFormat('en-IN').format(value);

input.value = '₹' + formatted;
}

function changeLanguage(){

let lang = document.getElementById("language").value;

document.getElementById("siOption").text =
translations[lang].simpleInterest;

document.getElementById("ciOption").text =
translations[lang].compoundInterest;

document.getElementById("emiOption").text =
translations[lang].emi;

document.getElementById("footerText").innerText =
translations[lang].footer;

document.getElementById("title").innerText =
translations[lang].title;

document.getElementById("amount").placeholder =
translations[lang].amount;

document.getElementById("rate").placeholder =
translations[lang].rate;

document.getElementById("time").placeholder =
translations[lang].time;

document.getElementById("calcBtn").innerText =
translations[lang].calculate;

document.getElementById("clearBtn").innerText =
translations[lang].clear;

document.getElementById("pdfBtn").innerText =
translations[lang].download;

document.getElementById("result").innerHTML =
translations[lang].waiting;

const themeBtn = document.getElementById("themeBtn");

if(document.body.classList.contains("dark")){
    themeBtn.innerText = translations[lang].light;
}else{
    themeBtn.innerText = translations[lang].theme;
}


document.getElementById("result").innerHTML =
translations[lang].waiting;
}
function toggleTheme(){
document.body.classList.toggle("dark");
}


function formatINR(num){
return "Rs. " + new Intl.NumberFormat('en-IN').format(num);

}


function calculate(){

let type=document.getElementById("calcType").value;

let P=parseFloat(
    
document.getElementById("amount").value
.replace(/₹/g,'')
.replace(/,/g,'')
);
let R=parseFloat(document.getElementById("rate").value);
let T=parseFloat(document.getElementById("time").value);

if(isNaN(P)||isNaN(R)||isNaN(T)){
alert("Please enter all values");
return;
}

let resultHTML="";

if(type==="si"){

    let interest=(P*R*T)/100;
let total=P+interest;

const lang = document.getElementById("language").value;


if(lang === "te"){

resultHTML=`
<h3>సాధారణ వడ్డీ</h3>
<p><b>మొత్తం:</b> ${formatINR(P)}</p>
<p><b>వడ్డీ:</b> ${formatINR(interest)}</p>
<p><b>మొత్తం చెల్లించవలసినది:</b> ${formatINR(total)}</p>
`;

}else{

resultHTML=`
<h3>Simple Interest</h3>
<p><b>Principal:</b> ${formatINR(P)}</p>
<p><b>Interest:</b> ${formatINR(interest)}</p>
<p><b>Total Amount:</b> ${formatINR(total)}</p>
`;

}
reportText=`
Simple Interest Report

Principal : ${formatINR(P)}
Rate : ${R}%
Time : ${T} months

Interest : ${formatINR(interest)}
Total Amount : ${formatINR(total)}
`;

}
else if(type==="ci"){

let total = P * Math.pow((1 + R/100), T);
let interest = total - P;

const lang = document.getElementById("language").value;

if(lang === "te"){

resultHTML = `
<h3>చక్రవడ్డీ</h3>
<p><b>మొత్తం:</b> ${formatINR(P)}</p>
<p><b>వడ్డీ:</b> ${formatINR(interest)}</p>
<p><b>మొత్తం చెల్లించవలసినది:</b> ${formatINR(total)}</p>
`;

}else{

resultHTML = `
<h3>Compound Interest</h3>
<p><b>Principal:</b> ${formatINR(P)}</p>
<p><b>Interest:</b> ${formatINR(interest)}</p>
<p><b>Total Amount:</b> ${formatINR(total)}</p>
`;

}

reportText = `
Compound Interest Report

Principal : ${formatINR(P)}
Rate : ${R}%
Time : ${T} Months

Interest : ${formatINR(interest)}
Total Amount : ${formatINR(total)}
`;

}

else{

let months = T; // Time already entered in months
let monthlyRate = R / (12 * 100);

let emi =
(P * monthlyRate * Math.pow(1 + monthlyRate, months)) /
(Math.pow(1 + monthlyRate, months) - 1);

let total = emi * months;
let interest = total - P;

const lang = document.getElementById("language").value;

if(lang === "te"){

resultHTML = `
<h3>ఈఎంఐ కాలిక్యులేటర్</h3>
<p><b>రుణ మొత్తం:</b> ${formatINR(P)}</p>
<p><b>నెలవారీ EMI:</b> ${formatINR(emi)}</p>
<p><b>మొత్తం వడ్డీ:</b> ${formatINR(interest)}</p>
<p><b>మొత్తం చెల్లింపు:</b> ${formatINR(total)}</p>
`;

}else{

resultHTML = `
<h3>EMI Calculator</h3>
<p><b>Loan Amount:</b> ${formatINR(P)}</p>

async function downloadPDF(){

if(reportText===""){
    alert("Please calculate first");
    return;
}

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const lang = document.getElementById("language").value;

    if(type === "si") type = "Simple Interest";
    else if(type === "ci") type = "Compound Interest";
    else if(type === "emi") type = "EMI Calculator";
} else {
    if(type === "si") type = "Simple Interest";
    else if(type === "ci") type = "Compound Interest";
    else if(type === "emi") type = "EMI Calculator";
}
const P = parseFloat(
document.getElementById("amount").value
.replace(/[^\d.]/g,'')
);

const amount =
"Rs. " + new Intl.NumberFormat('en-IN').format(P);

const time = document.getElementById("time").value;

const date = new Date().toLocaleString();

doc.setFillColor(0,123,255);
doc.rect(0,0,210,25,"F");

doc.setTextColor(255,255,255);
doc.setFontSize(20);
doc.text("Developed by shiva velishoju ",105,15,{align:"center"});

doc.setTextColor(0,0,0);

doc.setFontSize(11);
doc.text("Generated: " + date,14,35);
